<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ludo Board</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:black;
}

.board{
    width:95vmin;
    height:95vmin;
    margin:auto;
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(15,1fr);
    grid-template-rows:repeat(15,1fr);
}

/* small boxes */
.cell{
    border:1px solid #ccc;
    background:white;
}

/* Home Areas */
.red-home{ grid-column:1/7; grid-row:1/7; background:#ff2b2b; display:flex; justify-content:center; align-items:center; }
.blue-home{ grid-column:10/16; grid-row:1/7; background:#1e90ff; display:flex; justify-content:center; align-items:center; }
.green-home{ grid-column:1/7; grid-row:10/16; background:#00cc44; display:flex; justify-content:center; align-items:center; }
.yellow-home{ grid-column:10/16; grid-row:10/16; background:#ffcc00; display:flex; justify-content:center; align-items:center; }

/* Inner white square */
.inner{
    width:70%;
    height:70%;
    background:white;
    border-radius:10px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    grid-template-rows:repeat(2,1fr);
    gap:15px;
    justify-items:center;
    align-items:center;
}

/* 4 dots */
.dot{
    width:20px;
    height:20px;
    border-radius:50%;
}

.red{ background:red; }
.blue{ background:#1e90ff; }
.green{ background:green; }
.yellow{ background:orange; }

/* center */
.center{
    grid-column:7/10;
    grid-row:7/10;
    background:conic-gradient(
        red 0deg 90deg,
        blue 90deg 180deg,
        yellow 180deg 270deg,
        green 270deg 360deg
    );
}

/* path areas */
.vertical-path{
    grid-column:7/10;
    grid-row:1/7;
}

.vertical-path2{
    grid-column:7/10;
    grid-row:10/16;
}

.horizontal-path{
    grid-column:1/7;
    grid-row:7/10;
}

.horizontal-path2{
    grid-column:10/16;
    grid-row:7/10;
}

.path{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(6,1fr);
}

.path div{
    border:1px solid #ccc;
    background:white;
}

</style>
</head>
<body>

<div class="container">

<div class="board">

<!-- RED HOME -->
<div class="red-home">
    <div class="inner">
        <div class="dot red"></div>
        <div class="dot red"></div>
        <div class="dot red"></div>
        <div class="dot red"></div>
    </div>
</div>

<!-- BLUE HOME -->
<div class="blue-home">
    <div class="inner">
        <div class="dot blue"></div>
        <div class="dot blue"></div>
        <div class="dot blue"></div>
        <div class="dot blue"></div>
    </div>
</div>

<!-- GREEN HOME -->
<div class="green-home">
    <div class="inner">
        <div class="dot green"></div>
        <div class="dot green"></div>
        <div class="dot green"></div>
        <div class="dot green"></div>
    </div>
</div>

<!-- YELLOW HOME -->
<div class="yellow-home">
    <div class="inner">
        <div class="dot yellow"></div>
        <div class="dot yellow"></div>
        <div class="dot yellow"></div>
        <div class="dot yellow"></div>
    </div>
</div>

<!-- PATHS -->
<div class="vertical-path path">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
</div>

<div class="vertical-path2 path">
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
    <div></div><div></div><div></div>
</div>

<div class="horizontal-path path" style="grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(3,1fr);">
    <div></div><div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div><div></div>
</div>

<div class="horizontal-path2 path" style="grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(3,1fr);">
    <div></div><div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div><div></div>
    <div></div><div></div><div></div><div></div><div></div><div></div>
</div>

<!-- CENTER -->
<div class="center"></div>

</div>
</div>

</body>
</html>
